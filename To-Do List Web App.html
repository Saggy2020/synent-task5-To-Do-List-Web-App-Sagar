<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            background: #eef2f7;
            color: #1f2937;
        }

        .app {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .todo-box {
            width: 100%;
            max-width: 560px;
            background: #ffffff;
            border: 1px solid #dde3ec;
            border-radius: 8px;
            padding: 28px;
            box-shadow: 0 18px 45px rgba(31, 41, 55, 0.12);
        }

        .heading {
            margin-bottom: 22px;
        }

        .label {
            margin: 0 0 6px;
            color: #2563eb;
            font-size: 14px;
            font-weight: 700;
        }

        h1 {
            margin: 0;
            font-size: 30px;
            line-height: 1.2;
        }

        .task-form {
            display: flex;
            gap: 10px;
        }

        .task-form input {
            flex: 1;
            min-width: 0;
            padding: 12px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
        }

        .task-form input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
        }

        .task-form button,
        .delete-btn {
            border: 0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 700;
        }

        .task-form button {
            padding: 12px 18px;
            background: #2563eb;
            color: #ffffff;
        }

        .task-form button:hover {
            background: #1d4ed8;
        }

        .message {
            min-height: 20px;
            margin: 12px 0 0;
            color: #dc2626;
            font-size: 14px;
        }

        .task-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 14px;
        }

        .complete-btn {
            border: 0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 700;
            padding: 10px 14px;
            background: #10b981;
            color: #ffffff;
        }

        .complete-btn:hover {
            background: #059669;
        }

        .section-heading {
            margin: 24px 0 10px;
            font-size: 18px;
            font-weight: 700;
            color: #1f2937;
        }

        .task-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            margin-bottom: 10px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
        }

        .task-item.completed .task-text {
            color: #64748b;
            text-decoration: line-through;
        }

        .task-check {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .task-text {
            flex: 1;
            overflow-wrap: anywhere;
            font-size: 16px;
        }

        .delete-btn {
            padding: 8px 12px;
            background: #ef4444;
            color: #ffffff;
        }

        .delete-btn:hover {
            background: #dc2626;
        }

        .empty-text {
            display: none;
            margin: 20px 0 0;
            color: #64748b;
            text-align: center;
        }

        .empty-text.show {
            display: block;
        }

        @media (max-width: 520px) {
            .todo-box {
                padding: 22px;
            }

            .task-form {
                flex-direction: column;
            }

            .task-form button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <main class="app">
        <section class="todo-box">
            <div class="heading">
                <p class="label">Task Manager</p>
                <h1>My To-Do List</h1>
            </div>

            <form id="taskForm" class="task-form">
                <input
                    type="text"
                    id="taskInput"
                    placeholder="Enter a new task"
                    autocomplete="off"
                >
                <button type="submit">Add Task</button>
            </form>

            <p id="message" class="message"></p>

            <div class="task-actions">
                <button type="button" id="completeSelectedBtn" class="complete-btn">Complete</button>
            </div>

            <h2 class="section-heading">Pending Tasks</h2>
            <ul id="taskList" class="task-list"></ul>
            <p id="emptyText" class="empty-text">No tasks added yet.</p>

            <h2 class="section-heading">Completed Tasks</h2>
            <ul id="completedList" class="task-list"></ul>
            <p id="completedEmptyText" class="empty-text">No completed tasks yet.</p>
        </section>
    </main>

    <script>
        const taskForm = document.getElementById("taskForm");
        const taskInput = document.getElementById("taskInput");
        const taskList = document.getElementById("taskList");
        const completedList = document.getElementById("completedList");
        const emptyText = document.getElementById("emptyText");
        const completedEmptyText = document.getElementById("completedEmptyText");
        const message = document.getElementById("message");
        const completeSelectedBtn = document.getElementById("completeSelectedBtn");

        const storageKey = "todoListTasks";
        let tasks = loadTasks();
        let selectedTaskIds = [];

        renderTasks();

        taskForm.addEventListener("submit", function (event) {
            event.preventDefault();

            const taskName = taskInput.value.trim();

            if (taskName === "") {
                showMessage("Please enter a task.");
                return;
            }

            tasks.push({
                id: Date.now(),
                title: taskName,
                completed: false
            });

            taskInput.value = "";
            showMessage("");
            saveTasks();
            renderTasks();
        });

        completeSelectedBtn.addEventListener("click", function () {
            if (selectedTaskIds.length === 0) {
                showMessage("Please select a task to complete.");
                return;
            }

            tasks = tasks.map(function (task) {
                if (selectedTaskIds.includes(task.id)) {
                    return {
                        ...task,
                        completed: true
                    };
                }

                return task;
            });

            selectedTaskIds = [];
            saveTasks();
            renderTasks();
            showMessage("Task marked as complete.");
        });

        function renderTasks() {
            taskList.innerHTML = "";
            completedList.innerHTML = "";

            const pendingTasks = tasks.filter(function (task) {
                return !task.completed;
            });
            const completedTasks = tasks.filter(function (task) {
                return task.completed;
            });

            emptyText.classList.toggle("show", pendingTasks.length === 0);
            completedEmptyText.classList.toggle("show", completedTasks.length === 0);

            pendingTasks.forEach(function (task) {
                const item = document.createElement("li");
                item.className = "task-item";

                const checkbox = document.createElement("input");
                checkbox.type = "checkbox";
                checkbox.className = "task-check";
                checkbox.checked = selectedTaskIds.includes(task.id);
                checkbox.addEventListener("change", function () {
                    if (checkbox.checked) {
                        if (!selectedTaskIds.includes(task.id)) {
                            selectedTaskIds.push(task.id);
                        }
                    } else {
                        selectedTaskIds = selectedTaskIds.filter(function (id) {
                            return id !== task.id;
                        });
                    }
                });

                const taskText = document.createElement("span");
                taskText.className = "task-text";
                taskText.textContent = task.title;

                const deleteButton = document.createElement("button");
                deleteButton.type = "button";
                deleteButton.className = "delete-btn";
                deleteButton.textContent = "Delete";
                deleteButton.addEventListener("click", function () {
                    deleteTask(task.id);
                });

                item.appendChild(checkbox);
                item.appendChild(taskText);
                item.appendChild(deleteButton);
                taskList.appendChild(item);
            });

            completedTasks.forEach(function (task) {
                const item = document.createElement("li");
                item.className = "task-item completed";

                const taskText = document.createElement("span");
                taskText.className = "task-text";
                taskText.textContent = task.title;

                const deleteButton = document.createElement("button");
                deleteButton.type = "button";
                deleteButton.className = "delete-btn";
                deleteButton.textContent = "Delete";
                deleteButton.addEventListener("click", function () {
                    deleteTask(task.id);
                });

                item.appendChild(taskText);
                item.appendChild(deleteButton);
                completedList.appendChild(item);
            });
        }

        function deleteTask(taskId) {
            tasks = tasks.filter(function (task) {
                return task.id !== taskId;
            });

            selectedTaskIds = selectedTaskIds.filter(function (id) {
                return id !== taskId;
            });

            saveTasks();
            renderTasks();
        }

        function saveTasks() {
            localStorage.setItem(storageKey, JSON.stringify(tasks));
        }

        function loadTasks() {
            const savedTasks = localStorage.getItem(storageKey);

            if (savedTasks === null) {
                return [];
            }

            try {
                return JSON.parse(savedTasks);
            } catch (error) {
                return [];
            }
        }

        function showMessage(text) {
            message.textContent = text;
        }
    </script>
</body>
</html>
